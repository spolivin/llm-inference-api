global:
  scrape_interval: 15s
  scrape_timeout: 10s
  

scrape_configs:
  - job_name: 'scrapping-main-app'
    metrics_path: /metrics
    scheme: http
    static_configs:
    - targets: ["whisperapi_app:8035"]
      labels:
        instance: "whisper"
    
    - targets: ["ttsapi_app:8025"]
      labels:
        instance: "silero"
    
    - targets: ["gemmaapi_app:8005"]
      labels:
        instance: "gemma"
    
    - targets: ["llamaapi_app:8012"]
      labels:
        instance: "llama"
    
    - targets: ["sdapi_app:8015"]
      labels:
        instance: "stable_diffusion"
